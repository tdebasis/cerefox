{% if success %}
<div class="flash-success">
  ✓ Ingested <strong>"{{ title }}"</strong> successfully.
</div>
{% elif skipped %}
<div class="flash-info">
  ↩ Skipped <strong>"{{ title }}"</strong> — already in the knowledge base (same content).
</div>
{% elif error %}
<div class="flash-error">
  ⚠ {{ error }}
</div>
{% endif %}
