<button hx-get="/document/{{ document_id }}/content-hide?chars={{ total_chars }}"
        hx-target="#doc-content" hx-swap="innerHTML"
        class="outline secondary btn-sm" style="margin-bottom:0.75rem;">
  Hide content
</button>
<article style="margin-top:0.5rem;">
  {# Hidden pre holds raw markdown — avoids JSON-encoding issues with Jinja2 interpolation. #}
  <pre id="md-raw-{{ document_id }}" style="display:none;">{{ full_content }}</pre>
  <div id="md-preview-{{ document_id }}" class="md-preview">
    {# Fallback: shown as plain text until marked.js renders it. #}
    <pre style="white-space:pre-wrap;font-size:0.85rem;line-height:1.6;margin:0;">{{ full_content }}</pre>
  </div>
  <script>
  (function () {
    function render() {
      var raw = document.getElementById('md-raw-{{ document_id }}');
      var preview = document.getElementById('md-preview-{{ document_id }}');
      if (!raw || !preview || typeof marked === 'undefined' || typeof DOMPurify === 'undefined') return;
      preview.innerHTML = DOMPurify.sanitize(marked.parse(raw.textContent));
    }
    // marked.js and DOMPurify load with defer — run immediately if already loaded, else retry.
    if (typeof marked !== 'undefined' && typeof DOMPurify !== 'undefined') {
      render();
    } else {
      window.addEventListener('load', render);
      setTimeout(render, 400);
    }
  }());
  </script>
</article>
