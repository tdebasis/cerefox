<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Cerefox{% endblock %}</title>
  <link rel="icon" type="image/jpeg" href="/static/cerefox_logo.jpg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://unpkg.com/htmx.org@1.9.12" crossorigin="anonymous"></script>
  <style>
    :root { --nav-element-spacing-horizontal: 1rem; }
    header { border-bottom: 1px solid var(--pico-muted-border-color); margin-bottom: 2rem; }
    .brand { font-weight: 700; font-size: 1.1rem; text-decoration: none; color: inherit; display: flex; align-items: center; gap: 0.45rem; }
    .brand img { height: 1.6rem; width: auto; border-radius: 4px; }
    nav ul li a { color: var(--pico-secondary); }
    nav ul li a.active, nav ul li a:hover { color: var(--pico-primary); }
    .score-pill {
      display: inline-block; padding: 0.15rem 0.45rem; border-radius: 999px;
      font-size: 0.75rem; font-weight: 600; background: white;
      color: var(--pico-color); border: 1px solid var(--pico-muted-border-color);
      margin-right: 0.5rem; cursor: default;
    }
    .breadcrumb { font-size: 0.8rem; color: var(--pico-muted-color); margin-bottom: 0.25rem; }
    .breadcrumb span + span::before { content: " › "; }
    .chunk-card { border-left: 3px solid var(--pico-primary-background); padding-left: 1rem; margin-bottom: 1rem; }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
    .stat-card { text-align: center; padding: 1.5rem; }
    .stat-number { font-size: 2.5rem; font-weight: 700; color: var(--pico-primary); }
    .stat-label { color: var(--pico-muted-color); font-size: 0.9rem; }
    .result-item { border: 1px solid var(--pico-muted-border-color); border-radius: var(--pico-border-radius);
      padding: 1rem; margin-bottom: 0.75rem; }
    .result-item:hover { border-color: var(--pico-primary-background); }
    .result-content { font-size: 0.9rem; color: var(--pico-muted-color); white-space: pre-wrap; }
    .empty-state { text-align: center; padding: 3rem; color: var(--pico-muted-color); }
    .flash-success { background: white; color: var(--pico-ins-color);
      border: 1px solid var(--pico-ins-color); padding: 0.75rem 1rem;
      border-radius: var(--pico-border-radius); margin-bottom: 1rem; }
    .flash-error   { background: white; color: var(--pico-del-color);
      border: 1px solid var(--pico-del-color); padding: 0.75rem 1rem;
      border-radius: var(--pico-border-radius); margin-bottom: 1rem; }
    .flash-info    { background: white; color: var(--pico-primary);
      border: 1px solid var(--pico-primary-border); padding: 0.75rem 1rem;
      border-radius: var(--pico-border-radius); margin-bottom: 1rem; }
    /* Shared button utilities */
    /* margin-bottom:0 prevents PicoCSS form-context margin pushing buttons down in flex rows */
    .btn-sm     { font-size: 0.8rem !important; padding: 0.2rem 0.6rem !important; line-height: 1.5 !important; width: auto !important; display: inline-block !important; margin-bottom: 0 !important; vertical-align: middle !important; }
    /* btn-inline: auto-width for Save/Cancel pairs and page-level actions.
       Explicit padding, font-size, box-sizing, and line-height so <button> and <a role="button">
       share identical computed height regardless of PicoCSS variant (outline, contrast, etc.). */
    .btn-inline { width: auto !important; display: inline-block !important; line-height: 1.5 !important; padding: 0.5rem 1rem !important; font-size: 1rem !important; box-sizing: border-box !important; margin-bottom: 0 !important; vertical-align: middle !important; }
    .btn-danger { background: var(--pico-del-color) !important; border-color: var(--pico-del-color) !important; color: white !important; }
    /* Project label — neutral, no colour accent */
    .proj-pill { display:inline-block; font-size:0.7rem; color:var(--pico-muted-color); border:1px solid var(--pico-muted-border-color); border-radius:3px; padding:0 0.3rem; margin-left:0.25rem; vertical-align:middle; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header class="container-fluid">
    <nav>
      <ul>
        <li><a href="/" class="brand"><img src="/static/cerefox_logo.jpg" alt="Cerefox logo"> Cerefox</a></li>
      </ul>
      <ul>
        <li><a href="/" class="{% if active == 'dashboard' %}active{% endif %}">Dashboard</a></li>
        <li><a href="/search" class="{% if active == 'search' %}active{% endif %}">Search</a></li>
        <li><a href="/ingest" class="{% if active == 'ingest' %}active{% endif %}">Ingest</a></li>
        <li><a href="/projects" class="{% if active == 'projects' %}active{% endif %}">Projects</a></li>
        <li><a href="/settings" class="{% if active == 'settings' %}active{% endif %}">Settings</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    {% if error %}
    <div class="flash-error">⚠ {{ error }}</div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <footer class="container-fluid" style="margin-top:3rem;padding:1rem 0;border-top:1px solid var(--pico-muted-border-color);color:var(--pico-muted-color);font-size:0.8rem;">
    Cerefox — personal knowledge base
  </footer>

  <!-- Loading modal — shown by JS when a [data-loading-modal] form submits via HTMX -->
  <dialog id="cf-loading-modal">
    <article style="width:18rem;text-align:center;padding:2rem 1.5rem;margin:0;">
      <p aria-busy="true" style="margin:0 0 0.5rem;">Processing…</p>
      <small style="color:var(--pico-muted-color);">This may take a few seconds.</small>
    </article>
  </dialog>
  <script>
  (function () {
    var modal = document.getElementById('cf-loading-modal');
    if (!modal) return;
    // HTMX requests (ingest form, etc.)
    document.body.addEventListener('htmx:beforeRequest', function (evt) {
      if (evt.target.closest('[data-loading-modal]')) modal.showModal();
    });
    document.body.addEventListener('htmx:afterRequest', function () {
      if (modal.open) modal.close();
    });
    // Regular form submits (edit document, etc.) — modal closes naturally on page navigation.
    document.body.addEventListener('submit', function (evt) {
      if (evt.target.closest('[data-loading-modal]')) modal.showModal();
    });
  }());
  // Convert <time> elements with ISO-8601 datetime to local time.
  // Works on initial load and after HTMX partial swaps.
  function localizeTimeElements(root) {
    (root || document).querySelectorAll('time[datetime]').forEach(function (el) {
      if (el.dataset.localized) return;
      var dt = new Date(el.getAttribute('datetime'));
      if (isNaN(dt)) return;
      var fmt = el.dataset.format || 'date';  // 'date' or 'datetime'
      if (fmt === 'datetime') {
        el.textContent = dt.toLocaleDateString(undefined, {year:'numeric',month:'short',day:'numeric'})
          + ' ' + dt.toLocaleTimeString(undefined, {hour:'2-digit',minute:'2-digit'});
      } else {
        el.textContent = dt.toLocaleDateString(undefined, {year:'numeric',month:'short',day:'numeric'});
      }
      el.dataset.localized = '1';
    });
  }
  localizeTimeElements();
  document.body.addEventListener('htmx:afterSwap', function (evt) {
    localizeTimeElements(evt.detail.target);
  });
  </script>
</body>
</html>
